<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="textglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="leftcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#111820"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="rightcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f1a24"/>
      <stop offset="100%" stop-color="#0b1219"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#79a7c5" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#79a7c5" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#79a7c5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#79a7c5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0d1117"/>

  <!-- ── LEFT CARD ── -->
  <rect x="0" y="0" width="392" height="200" rx="12" fill="url(#leftcard)" stroke="#1e3448" stroke-width="1"/>
  <rect x="0" y="0" width="392" height="2" rx="1" fill="#79a7c5" opacity="0.5"/>

  <!-- File tag -->
  <rect x="16" y="12" width="90" height="20" rx="4" fill="#162535"/>
  <text x="24" y="25" font-family="Courier New,monospace" font-size="10" fill="#4a8aab" letter-spacing="1">about.py</text>

  <!-- class Laveena: — y=56 -->
  <text x="20" y="56" font-family="Courier New,monospace" font-size="13" fill="#3a6a88" opacity="0">
    class
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
  </text>
  <text x="62" y="56" font-family="Courier New,monospace" font-size="13" font-weight="700" fill="#79a7c5" filter="url(#textglow)" opacity="0">
    Laveena
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
  </text>
  <text x="130" y="56" font-family="Courier New,monospace" font-size="13" fill="#4a8aab" opacity="0">
    :
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- role — y=84 -->
  <text x="36" y="84" font-family="Courier New,monospace" font-size="12" fill="#5b8fa8" opacity="0">
    role
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </text>
  <text x="100" y="84" font-family="Courier New,monospace" font-size="12" fill="#3a5a6a" opacity="0">
    =
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </text>
  <text x="116" y="84" font-family="Courier New,monospace" font-size="12" fill="#a8c8dc" opacity="0">
    "Data &amp; ML Engineer"
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
  </text>

  <!-- currently — y=110 -->
  <text x="36" y="110" font-family="Courier New,monospace" font-size="12" fill="#5b8fa8" opacity="0">
    currently
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>
  <text x="100" y="110" font-family="Courier New,monospace" font-size="12" fill="#3a5a6a" opacity="0">
    =
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>
  <text x="116" y="110" font-family="Courier New,monospace" font-size="12" fill="#a8c8dc" opacity="0">
    "Building Creative Tech."
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- open_to — y=136 -->
  <text x="36" y="136" font-family="Courier New,monospace" font-size="12" fill="#5b8fa8" opacity="0">
    open_to
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>
  <text x="100" y="136" font-family="Courier New,monospace" font-size="12" fill="#3a5a6a" opacity="0">
    =
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>
  <text x="116" y="136" font-family="Courier New,monospace" font-size="12" fill="#a8c8dc" opacity="0">
    "Collabs &amp; cool problems"
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
  </text>

  <!-- blinking cursor — y=162 -->
  <rect x="20" y="152" width="7" height="14" rx="1" fill="#79a7c5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1;0" dur="1s" begin="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- ── RIGHT CARD ── -->
  <rect x="408" y="0" width="392" height="200" rx="12" fill="url(#rightcard)" stroke="#1e3448" stroke-width="1"/>
  <rect x="408" y="0" width="392" height="2" rx="1" fill="#5b8fa8" opacity="0.45"/>

  <!-- Terminal prompt — y=25, matches file tag height on left -->
  <text x="424" y="25" font-family="Courier New,monospace" font-size="11" fill="#2e6a8a" opacity="0">
    ┌─[lavee3@github ~]
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Vertical bar — from y=30 to y=144, spans all 3 rows -->
  <line x1="430" y1="30" x2="430" y2="144" stroke="#1e4060" stroke-width="1.2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
  </line>

  <!-- Row 1 — y=56 (matches class line on left) -->
  <text x="432" y="56" font-family="Courier New,monospace" font-size="11" fill="#2e6a8a" opacity="0">
    ├─
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
  </text>
  <circle cx="468" cy="51" r="3.5" fill="#79a7c5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="478" y="56" font-family="Courier New,monospace" font-size="12" fill="#c8dce8" opacity="0">
    Researching LLMs &amp; Transformers
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Row 2 — y=110 (matches currently on left) -->
  <text x="432" y="110" font-family="Courier New,monospace" font-size="11" fill="#2e6a8a" opacity="0">
    ├─
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
  </text>
  <circle cx="468" cy="105" r="3.5" fill="#5b8fa8" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" begin="1.85s" repeatCount="indefinite"/>
  </circle>
  <text x="478" y="110" font-family="Courier New,monospace" font-size="12" fill="#c8dce8" opacity="0">
    Learning Generative AI
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>

  <!-- Row 3 — y=136 (matches open_to on left) -->
  <text x="432" y="136" font-family="Courier New,monospace" font-size="11" fill="#2e6a8a" opacity="0">
    └─
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
  </text>
  <circle cx="468" cy="131" r="3.5" fill="#3a7a9a" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" begin="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="478" y="136" font-family="Courier New,monospace" font-size="12" fill="#c8dce8" opacity="0">
    Linux native · always in terminal
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Divider -->
  <rect x="397" y="10" width="1.5" height="180" fill="url(#divider)"/>

</svg>
